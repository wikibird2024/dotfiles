# =======================================================================
# Alacritty Config - Optimized for i3wm, Arch Linux, and JetBrains Mono
# =======================================================================

[general]
live_config_reload = true

[window]
decorations = "full"
startup_mode = "Windowed"  # Capitalized to match Alacritty's strict Enum parsing
opacity = 1.0

[window.padding]
x = 10
y = 10

[font]
size = 10.5

[font.normal]
family = "JetBrains Mono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrains Mono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrains Mono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrains Mono Nerd Font"
style = "Bold Italic"

[font.offset]
x = 0
y = 4

[cursor]
style = { shape = "Block", blinking = "Off" }

[colors.primary]
background = "#282828"
foreground = "#fbf1c7"

[colors.cursor]
text = "#282828"
cursor = "#5cf56e"

[colors.selection]
background = "#504945"
text = "#ebdbb2"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true

[[mouse.bindings]]
mouse = "Right"
action = "PasteSelection"

# --- Keyboard Shortcuts (Zoom Control) ---
[[keyboard.bindings]]
key = "Equals"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

[env]
TERM = "xterm-256color"

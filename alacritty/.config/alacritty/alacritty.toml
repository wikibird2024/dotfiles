# =======================================================================
# Alacritty Config - Optimized for i3wm, Arch Linux, and JetBrains Mono
# =======================================================================

[general]
live_config_reload = true

[window]
decorations = "none"
startup_mode = "Windowed"  # Capitalized to match Alacritty's strict Enum parsing
opacity = 1.0

[window.padding]
x = 10
y = 10

[font]
size = 11.0

[font.normal]
family = "JetBrains Mono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrains Mono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrains Mono Nerd Font"
style = "Italic"

[font.offset]
x = 0
y = 4

[cursor]
style = "Block"

[colors.primary]
background = "#202020"
foreground = "#F5E0B3"

[colors.cursor]
text = "#000000"
cursor = "#FFE866"

[colors.normal]
black   = "#1a1a1a"
red     = "#ff4c4c"
green   = "#55dd55"
yellow  = "#ffd75f"
blue    = "#5f87d7"
magenta = "#d787ff"
cyan    = "#5fd7d7"
white   = "#d0d0d0"

[colors.bright]
black   = "#4d4d4d"
red     = "#ff6666"
green   = "#88ff88"
yellow  = "#ffff88"
blue    = "#87afff"
magenta = "#ffaaff"
cyan    = "#87ffff"
white   = "#ffffff"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true

[[mouse.bindings]]
mouse = "Right"
action = "PasteSelection"

# --- Keyboard Shortcuts (Zoom Control) ---
[[keyboard.bindings]]
key = "Equals"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

[env]
TERM = "xterm-256color"

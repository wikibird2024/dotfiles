# ===================================================================
# TMUX CONFIGURATION — APEX STABLE (Optimized for i3wm & Neovim)
# ===================================================================

# --- 1. CORE SETTINGS (Tối ưu phản hồi) ----------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1           # Bắt đầu window từ 1
setw -g pane-base-index 1      # Bắt đầu pane từ 1
set -sg escape-time 0         # Phản hồi Esc tức thì (tối ưu cho Neovim)
set -g focus-events on        # Hỗ trợ autoread cho Neovim
set -g mouse on               # Bật chuột
set -g history-limit 50000    # Tăng buffer cho debug/logging

# --- 2. DISPLAY & COLORS (Đảm bảo màu sắc chuẩn) -------------------
set -g default-terminal "screen-256color"
set -as terminal-overrides ',*:Tc' # Hỗ trợ TrueColor (24-bit color)

# --- 3. KEYBINDINGS (Thao tác nhanh) -------------------------------
# Reload config với thông báo
bind r source-file ~/.tmux.conf \; display-message "⚡ Config reloaded!"

# Chia cửa sổ (Split) giữ nguyên đường dẫn làm việc
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Di chuyển Pane bằng Alt + hjkl (Không cần nhấn Prefix)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- 4. VI MODE & CLIPBOARD (Cho dân chuyên hệ thống) --------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- 5. STATUS LINE (Giao diện Catppuccin-ish sạch sẽ) --------------
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 50
set -g status-left "#[fg=yellow,bold]  #S #[fg=white]| "

set -g window-status-current-format "#[fg=black,bg=yellow,bold] #I:#W #[default]"
set -g window-status-format "#[fg=white] #I:#W "

set -g status-right-length 100
set -g status-right "#[fg=cyan]󱑒 %H:%M #[fg=white]| #[fg=green]󰭹 #{user} "

# --- 6. TPM & PLUGINS ----------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# --- 7. PLUGIN STRATEGY (Chiến thuật an toàn) ----------------------
set -g @continuum-restore 'on'            # Tự động khôi phục session
set -g @continuum-save-interval '15'     # Lưu mỗi 15 phút
set -g @resurrect-capture-pane-contents 'on'

# Phím tắt lưu thủ công: Prefix + S
bind S run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh' \; display-message "💾 Session Saved!"

# Tự động cài đặt TPM nếu chưa có
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

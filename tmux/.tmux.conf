# ===================================================================
# TMUX CONFIGURATION — APEX STABLE v2.1
# Optimized for Neovim, i3wm, Hyprland, SSH, and Embedded Development
# ===================================================================

# --- 1. CORE SETTINGS ----------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1             # Start window numbering at 1
setw -g pane-base-index 1        # Start pane numbering at 1
set -sg escape-time 0           # Zero escape delay for instant Vim mode switching
set -g focus-events on          # Pass focus events to nested applications (Neovim autoread)
set -g mouse on                 # Enable full mouse interactions
set -g history-limit 50000      # Generous scrollback buffer size for debugging/logging

# --- 2. DISPLAY & COLORS -------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ',*:Tc'

# --- STABILITY ---
set -g automatic-rename off
setw -g allow-rename off

# --- 3. KEYBINDINGS ------------------------------------------------
# Reload configuration with visible confirmation
bind r source-file ~/.tmux.conf \; display-message "⚡ Config reloaded!"

# Split windows while retaining the current working directory path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation — handled by vim-tmux-navigator (C-hjkl works in both tmux and Neovim)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind -n C-\\ if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

# Keep Alt+hjkl as fallback if needed
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Step-based pane resizing (Prefix + repeatable Shift + HJKL)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- 4. VI MODE & CLIPBOARD ----------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- 5. STATUS BAR (Tokyo Night Premium Aesthetic) -----------------
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#c0caf5"

set -g status-left-length 60
set -g status-right-length 160

# Left - session name as a solid block (turns orange while prefix key is active)
set -g status-left "#[fg=#1a1b26,bg=#{?client_prefix,#e0af68,#2ac3de},bold] #S #[fg=#{?client_prefix,#e0af68,#2ac3de},bg=#1a1b26,nobold]"

# Inactive Window Tabs (Middle) - red flag if window has unseen activity, magnifier if zoomed
set -g window-status-format "#[fg=#{?window_activity_flag,#f7768e,#565f89},bg=#1a1b26] #I:#W#{?window_zoomed_flag,🔍,} "

# Active Window Tab (Middle) - Vibrant orange (#e0af68) accent, magnifier if zoomed
set -g window-status-current-format "#[fg=#1a1b26,bg=#e0af68,bold] #I:#W#{?window_zoomed_flag,🔍,} #[fg=#e0af68,bg=#1a1b26]"

# Telemetry Display (Right) - each block gets its own hue so the bar reads at
# a glance: cyan path, purple command, green host/ip, gold clock. Path/command
# stay regular weight (context); host/ip and clock are bold (identity/time -
# the parts worth noticing first).
set -g status-right "#[fg=#7dcfff]#{=/-35/...:pane_current_path} #[fg=#414868]│ #[fg=#bb9af7]#{pane_current_command} #[fg=#414868]│ #[fg=#9ece6a,bold]#(~/.tmux/scripts/pane_identity.sh '#{pane_tty}')#[nobold] #[fg=#414868]│ #[fg=#e0af68,bold]%H:%M#[nobold] "

# --- 6. TPM & PLUGINS ----------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# --- 7. PLUGIN STRATEGY --------------------------------------------
# Automatically restore complete environment on host boot/startup
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# Force manual save state checkpoint: Prefix + S
bind S run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh' \; display-message "💾 Session Saved!"

# Automatic Bootstrap: Install TPM and plugins immediately if missing
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

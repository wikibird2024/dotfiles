# --- CORE SETTINGS ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1

# Cải thiện hiển thị màu sắc và hỗ trợ True Color
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

set -g mouse on
set -g history-limit 50000
set -sg escape-time 10

# --- STABILITY ---
set -g automatic-rename off
setw -g allow-rename off

# --- KEYBINDINGS ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Di chuyển Pane bằng Alt + hjkl
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- STATUS LINE ---
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 50
set -g status-left "#[fg=yellow,bold] #S #[fg=white]| "
set -g window-status-current-format "#[fg=black,bg=yellow,bold] #I:#W #[default]"
set -g window-status-format "#[fg=white] #I:#W "
set -g status-right-length 100
set -g status-right "#[fg=cyan]%H:%M #[fg=white]| #[fg=green]#{user} "

# --- TPM & PLUGINS ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible' # Nên để lên đầu
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# --- SAFE STRATEGY CONFIG ---
set -g @continuum-restore 'off' # Tắt để tránh crash loop, dùng Prefix + Ctrl-R khi cần
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# Manual Save: Prefix + S
bind S run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh' \; display-message "Manual Save Done!"

# --- TPM BOOTSTRAP ---
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

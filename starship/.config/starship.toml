# =======================================================================
# STARSHIP.TOML - COMPACT 2-LINE CONFIG (FOR YOCTO/DOCKER)
# =======================================================================

# 1. GENERAL CONFIGURATION
add_newline = false

# format: Line 1 contains left-aligned info, utilizing $fill to push $time to the right edge.
format = """
$os$username$hostname$directory$git_branch$git_status$c$rust$python$nodejs$package$memory_usage$battery$cmd_duration$fill$time
$character"""

command_timeout = 800
scan_timeout = 500  # Increases file scanning limit to 500ms to prevent timeouts in massive repositories

# 2. COMMAND PROMPT (CHARACTER)
[character]
success_symbol = "[ÔØ»](bold green) "
error_symbol = "[ÔØ»](bold red) "
vimcmd_symbol = "[ÔØ«](bold green) "

# 3. SPACING CONTENT (FILL - Pushes elements to the right)
[fill]
symbol = " " # Uses blank whitespace to right-align the timestamp matrix

# 4. OPERATING SYSTEM & USER IDENTITY
[os]
disabled = false
style = "bold white"

[os.symbols]
Mint = "­şî┐ "
Arch = "¾░úç "
EndeavourOS = "´åù "
Linux = "´à╝ "
Ubuntu = "¯£║ "
Macos = "´à╣ "
Windows = "¯£Å "

[username]
show_always = true
style_user = "bold green"
style_root = "bold red"
format = "[$user]($style) "
disabled = false

[hostname]
ssh_only = true
format = "@[$hostname](bold yellow) "

[localip]
disabled = true

# 5. WORKING DIRECTORY (DIRECTORY)
[directory]
truncation_length = 2
truncate_to_repo = true
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " ­şöÆ"

# 6. VERSION CONTROL (GIT)
[git_branch]
symbol = "¯éá "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'

# 7. PROGRAMMING LANGUAGES & PACKAGE MANAGERS
[c]
symbol = "¯İŞ "
style = "bold blue"
format = "via [$symbol($version)]($style) "

[rust]
symbol = "­şĞÇ "
style = "bold #FFA500"
format = "via [$symbol($version)]($style) "

[python]
symbol = "­şÉı "
format = "via [$symbol($version)]($style) "

[nodejs]
symbol = "¾░ÄÖ "
style = "bold green"
format = "via [$symbol($version)]($style) "

[package]
disabled = false
symbol = "¾░Åù "
style = "bold dimmed white"
format = "is [$symbol$version]($style) "

# 8. SYSTEM HARDWARE MONITORING
[memory_usage]
disabled = false
threshold = 75
symbol = "¾░ıø "
style = "bold dimmed white"
format = "mem $symbol[$ram]($style) "

[cmd_duration]
min_time = 1000
format = "took [$duration](bold yellow) "

[battery]
disabled = false
full_symbol = "¾░ü╣ "
charging_symbol = "¾░éä "
discharging_symbol = "¾░éâ "

# 9. TIMESTAMP MATRIX (TIME - Right Aligned)
[time]
disabled = false
time_format = "%T"
style = "bold dimmed white"
format = "[$time]($style)"

# =======================================================================
# TOML RULES: ALL ARRAY CONFIGURATIONS MUST GO AT THE VERY END OF FILE
# =======================================================================
[[battery.display]]
threshold = 15
style = "bold red"

# =======================================================================
# STARSHIP.TOML - ULTIMATE EMBEDDED & SYSADMIN CONFIG
# =======================================================================

# 1. CẤU HÌNH CHUNG
# -----------------------------------------------------------------------
add_newline = true
# Format 2 dòng: Thông tin ở trên, dấu gõ lệnh ở dưới cho thoáng
format = """
$os$username$hostname$localip$directory$git_branch$git_status$c$rust$python$nodejs$package$memory_usage$cmd_duration
$line_break$character"""

command_timeout = 800

# 2. DẤU NHẮC LỆNH (CHARACTER)
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)" # Hỗ trợ cực tốt nếu bạn dùng Vi-mode

# 3. HỆ ĐIỀU HÀNH & NGƯỜI DÙNG (CHỈ HIỆN KHI CẦN)
[os]
disabled = false # Hiện icon Arch/EndeavourOS cho ngầu
style = "bold white"

[username]
show_always = false
format = " [$user]($style) "

[hostname]
ssh_only = true
format = "@[$hostname](bold yellow) "

# 4. THƯ MỤC (DIRECTORY)
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
format = "in [$path]($style)[$read_only]($read_only_style) "
read_only = " 🔒"

# 5. GIT - TRẠNG THÁI NÂNG CAO
[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'
# Các ký hiệu trực quan hơn cho dân Pro
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕"
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# 6. NGÔN NGỮ LẬP TRÌNH (TỐI ƯU CHO EMBEDDED)
[c]
symbol = " "
style = "bold blue"
format = "via [$symbol($version)]($style) " # Hiện version rất quan trọng khi làm việc với nhiều toolchain

[rust]
symbol = "🦀 "
style = "bold orange"
format = "via [$symbol($version)]($style) "

[python]
symbol = "🐍 "
format = "via [$symbol($version)]($style) "

[nodejs]
symbol = "󰎙 "
style = "bold green"
format = "via [$symbol($version)]($style) "

# 7. GIÁM SÁT HỆ THỐNG (PRO FEATURE)
[memory_usage]
disabled = false # Hiển thị khi RAM dùng quá 75%
threshold = 75
symbol = "󰍛 "
style = "bold dimmed white"
format = "mem $symbol[$ram]($style) "

[cmd_duration]
min_time = 1000 # Chỉ hiện nếu lệnh chạy lâu hơn 1 giây
format = "took [$duration](bold yellow) "

[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
[[battery.display]]
threshold = 15 # Chỉ hiện cảnh báo khi pin dưới 15%
style = "bold red"

# =======================================================================
# STARSHIP.TOML - COMPACT 2-LINE CONFIG (FOR YOCTO/DOCKER)
# =======================================================================

# 1. CẤU HÌNH CHUNG
add_newline = false

# format: Dòng 1 chứa thông tin bên trái, dùng $fill để đẩy $time sang phải.
format = """
$os$username$hostname$localip$directory$git_branch$git_status$c$rust$python$nodejs$package$memory_usage$cmd_duration$fill$time
$character"""

command_timeout = 800

[line_break]
disabled = true

# 2. DẤU NHẮC LỆNH (CHARACTER)
[character]
success_symbol = "[❯](bold green) "
error_symbol = "[❯](bold red) "
vimcmd_symbol = "[❮](bold green) "

# 3. KHOẢNG TRỐNG (FILL - Đẩy nội dung sang phải)
[fill]
symbol = " " # Sử dụng khoảng trắng để đẩy time về cuối dòng

# 4. HỆ ĐIỀU HÀNH & NGƯỜI DÙNG
[os]
disabled = false
style = "bold white"

[username]
show_always = false
format = " [$user]($style) "

[hostname]
ssh_only = true
format = "@[$hostname](bold yellow) "

# 5. THƯ MỤC (DIRECTORY)
[directory]
truncation_length = 2
truncate_to_repo = true
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " 🔒"

# 6. GIT
[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'

# 7. NGÔN NGỮ LẬP TRÌNH
[c]
symbol = " "
style = "bold blue"
format = "via [$symbol($version)]($style) "

[rust]
symbol = "🦀 "
style = "bold orange"
format = "via [$symbol($version)]($style) "

[python]
symbol = "🐍 "
format = "via [$symbol($version)]($style) "

[nodejs]
symbol = "󰎙 "
style = "bold green"
format = "via [$symbol($version)]($style) "

# 8. GIÁM SÁT HỆ THỐNG
[memory_usage]
disabled = false
threshold = 75
symbol = "󰍛 "
style = "bold dimmed white"
format = "mem $symbol[$ram]($style) "

[cmd_duration]
min_time = 1000
format = "took [$duration](bold yellow) "

[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
[[battery.display]]
threshold = 15
style = "bold red"

# 9. THỜI GIAN (TIME - Right Aligned)
[time]
disabled = false
time_format = "%T"
style = "bold dimmed white"
format = "[$time]($style)"

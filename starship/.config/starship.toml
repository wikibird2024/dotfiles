# =======================================================================
# STARSHIP.TOML - COMPACT 2-LINE CONFIG (FOR YOCTO/DOCKER)
# =======================================================================

# 1. CẤU HÌNH CHUNG (TỐI ƯU LIỀN MẠCH)
# -----------------------------------------------------------------------
add_newline = false # QUAN TRỌNG: Xóa dòng trống giữa các lệnh để tạo sự liên tục

# Format 2 dòng: Dòng 1 chứa thông tin, Dòng 2 chỉ chứa dấu nhắc lệnh
# Cách này giúp bạn có toàn bộ chiều ngang để gõ lệnh dài mà không bị vướng
format = """
$os$username$hostname$localip$directory$git_branch$git_status$c$rust$python$nodejs$package$memory_usage$cmd_duration
$character"""

command_timeout = 800

[line_break]
disabled = true # Vô hiệu hóa ngắt dòng mặc định để dùng format tùy chỉnh bên trên

# 2. DẤU NHẮC LỆNH (CHARACTER)
[character]
success_symbol = "[❯](bold green) " # Dấu cách sau ❯ để gõ lệnh thoải mái
error_symbol = "[❯](bold red) "
vimcmd_symbol = "[❮](bold green) "

# 3. HỆ ĐIỀU HÀNH & NGƯỜI DÙNG
[os]
disabled = false
style = "bold white"

[username]
show_always = false
format = " [$user]($style) "

[hostname]
ssh_only = true
format = "@[$hostname](bold yellow) "

# 4. THƯ MỤC (DIRECTORY - GỌN GÀNG)
[directory]
truncation_length = 2 # Chỉ hiện 2 cấp thư mục cuối để không choán chỗ
truncate_to_repo = true
style = "bold cyan"
format = "in [$path]($style)[$read_only]($read_only_style) "
read_only = " 🔒"

# 5. GIT - TRẠNG THÁI NÂNG CAO
[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕"
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# 6. NGÔN NGỮ LẬP TRÌNH (TỐI ƯU CHO EMBEDDED)
[c]
symbol = " "
style = "bold blue"
format = "via [$symbol($version)]($style) "

[rust]
symbol = "🦀 "
style = "bold orange"
format = "via [$symbol($version)]($style) "

[python]
symbol = "🐍 "
format = "via [$symbol($version)]($style) "

[nodejs]
symbol = "󰎙 "
style = "bold green"
format = "via [$symbol($version)]($style) "

# 7. GIÁM SÁT HỆ THỐNG
[memory_usage]
disabled = false
threshold = 75
symbol = "󰍛 "
style = "bold dimmed white"
format = "mem $symbol[$ram]($style) "

[cmd_duration]
min_time = 1000
format = "took [$duration](bold yellow) "

[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
[[battery.display]]
threshold = 15
style = "bold red"

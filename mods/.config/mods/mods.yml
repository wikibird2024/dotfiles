# Default engine provider (openai, localai, anthropic, gemini...)
default-provider: gemini
# Default model identifier
default-model: gemini-2.5-flash
# Text to append when using the -f flag
format-text:
  markdown: 'Format the response as markdown without enclosing backticks.'
  json: 'Format the response as json without enclosing backticks.'
# MCP Servers configurations
mcp-servers:
  # Example: GitHub MCP via Docker:
  # github:
  #   command: docker
  #   env:
  #     - GITHUB_PERSONAL_ACCESS_TOKEN=xxxyyy
  #   args:
  #     - run
  #     - "-i"
  #     - "--rm"
  #     - "-e"
  #     - GITHUB_PERSONAL_ACCESS_TOKEN
  #     - "ghcr.io/github/github-mcp-server"
# Timeout for MCP server calls, defaults to 15 seconds
mcp-timeout: 15s
# List of predefined system messages that can be used as roles
roles:
  "default": []
# Ask for the response to be formatted as markdown unless otherwise set
format: false
# System role to use
role: "default"
# Render output as raw text when connected to a TTY
raw: false
# Quiet mode (hide the spinner while loading and stderr messages for success)
quiet: false
# Temperature (randomness) of results, from 0.0 to 2.0, -1.0 to disable
temp: 1.0
# TopP, an alternative to temperature that narrows response, from 0.0 to 1.0, -1.0 to disable
topp: 1.0
# TopK, only sample from the top K options for each subsequent token, -1 to disable
topk: 50
# Turn off the client-side limit on the size of the input into the model
no-limit: false
# Wrap formatted output at specific width (default is 80)
word-wrap: 80
# Include the prompt from the arguments in the response
include-prompt-args: false
# Include the prompt from the arguments and stdin, truncate stdin to specified number of lines
include-prompt: 0
# Maximum number of times to retry API calls
max-retries: 5
# Your desired level of fanciness
fanciness: 10
# Text to show while generating
status-text: Generating
# Theme to use in the forms; valid choices are charm, catppuccin, dracula, and base16
theme: charm
# Default character limit on input to model (Gemini 2.5 context window mapping)
max-input-chars: 4194304
# Maximum number of tokens in response
max-completion-tokens: 8192

# Aliases and endpoints for compatible REST APIs
apis:
  openai:
    base-url: https://api.openai.com/v1
    api-key:
    api-key-env: OPENAI_API_KEY
    models:
      gpt-4.5-preview:
        aliases: ["gpt-4.5", "gpt4.5"]
        max-input-chars: 392000
        fallback: gpt-4
      gpt-4o-mini:
        aliases: ["4o-mini"]
        max-input-chars: 392000
        fallback: gpt-4o
      gpt-4o:
        aliases: ["4o"]
        max-input-chars: 392000
        fallback: gpt-4
      gpt-4:
        aliases: ["4"]
        max-input-chars: 24500
        fallback: gpt-3.5-turbo
  copilot:
    base-url: https://api.githubcopilot.com
    models:
      gpt-4o-2024-05-13:
        aliases: ["4o-2024", "4o", "gpt-4o"]
        max-input-chars: 392000
      claude-3.5-sonnet:
        aliases: ["claude3.5-sonnet", "sonnet-3.5", "claude-3-5-sonnet"]
        max-input-chars: 680000
  anthropic:
    base-url: https://api.anthropic.com/v1
    api-key:
    api-key-env: ANTHROPIC_API_KEY
    models:
      claude-3-7-sonnet-latest:
        aliases: ["claude3.7-sonnet", "claude-3-7-sonnet", "sonnet-3.7"]
        max-input-chars: 680000
      claude-3-5-sonnet-latest:
        aliases: ["claude3.5-sonnet", "claude-3-5-sonnet", "sonnet-3.5"]
        max-input-chars: 680000
  gemini:
    base-url: https://generativelanguage.googleapis.com/v1beta/openai/
    api-key-env: GEMINI_API_KEY
    models:
      gemini-2.5-flash:
        aliases: ["gm25f", "flash-2.5"]
        max-input-chars: 4194304
      gemini-2.0-flash-001:
        aliases: ["gm2f", "flash-2", "gemini-2-flash"]
        max-input-chars: 4194304
      gemini-2.0-flash-lite:
        aliases: ["gm2fl", "flash-2-lite", "gemini-2-flash-lite"]
        max-input-chars: 4194304
  ollama:
    base-url: http://localhost:11434
    models:
      "llama3.2:3b":
        aliases: ["llama3.2"]
        max-input-chars: 650000
  deepseek:
    base-url: https://api.deepseek.com/
    api-key:
    api-key-env: DEEPSEEK_API_KEY
    models:
      deepseek-chat:
        aliases: ["chat"]
        max-input-chars: 384000
      deepseek-reasoner:
        aliases: ["r1"]
        max-input-chars: 384000
  groq:
    base-url: https://api.groq.com/openai/v1
    api-key:
    api-key-env: GROQ_API_KEY
    models:
      llama-3.3-70b-versatile:
        aliases: ["llama3.3", "llama3.3-70b"]
        max-input-chars: 392000
      deepseek-r1-distill-qwen-32b:
        aliases: ["deepseek-r1", "r1-qwen"]
        max-input-chars: 392000

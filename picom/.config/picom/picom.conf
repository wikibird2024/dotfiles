#################################
#           Backend             #
#################################
backend = "glx";
vsync = true;
use-damage = true;

#################################
#           Corners             #
#################################
corner-radius = 12;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "class_g = 'i3bar'"
];

#################################
#           Shadows             #
#################################
shadow = true;
shadow-radius = 15;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-opacity = 0.5;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'i3-frame'",
  "_GTK_FRAME_EXTENTS"
];

#################################
#            Fading             #
#################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

#################################
#   Transparency / Opacity      #
#################################
inactive-opacity = 0.8;
active-opacity = 0.7;
frame-opacity = 1.0;

opacity-rule = [
  "100:class_g = 'firefox'",
  "100:class_g = 'Thunderbird'",
  "95:class_g = 'Alacritty'",
  "95:class_g = 'Kitty'",
  "90:class_g = 'Rofi'"
];

#################################
#              Blur             #
#################################
blur-method = "dual_kawase";
blur-strength = 6;
blur-background = true;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS"
];

#################################
#        General Settings       #
#################################
mark-wmwin-focused = true;
mark-ovlp-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
unredir-if-possible = false;
log-level = "warn";

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 1.0; };
  dropdown_menu = { opacity = 1.0; };
};
